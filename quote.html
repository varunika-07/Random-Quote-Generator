<!DOCTYPE html>
<html>
<head>
    <title>Random Quote Generator</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #eef2f3;
        }
        .box {
            background: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }
        button {
            padding: 10px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h2>Random Quote Generator</h2>

<div class="box">
    <p id="quote"></p>
    <h4 id="author"></h4>
    <button onclick="newQuote()">New Quote</button>
</div>

<script>
let quotes = [
    {q: "Believe in yourself", a: "Unknown"},
    {q: "Never give up", a: "Winston Churchill"},
    {q: "Dream big", a: "Anonymous"},
    {q: "Stay positive", a: "Unknown"}
];

function newQuote() {
    let random = Math.floor(Math.random() * quotes.length);
    document.getElementById("quote").innerText = quotes[random].q;
    document.getElementById("author").innerText = "- " + quotes[random].a;
}

newQuote();
</script>

</body>
</html>
